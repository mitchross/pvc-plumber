version: "2"

run:
  timeout: 5m
  tests: true

linters:
  # `default: standard` enables errcheck, govet, ineffassign, staticcheck,
  # unused — the v2 successor of the v1 default set. `gosimple` from v1
  # was folded into `staticcheck` in v2 and is no longer a separate linter.
  default: standard
  enable:
    - bodyclose
    - goconst
    - misspell
    - noctx
    - unconvert
    - unparam
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
    misspell:
      locale: US

# Formatters moved to their own top-level section in v2 (gofmt/goimports
# used to live under `linters`/`linters-settings` in v1).
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
